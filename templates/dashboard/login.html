{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manager Login — QR Manu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body style="padding-bottom:0;">
<div class="login-wrap">
  <div class="login-card">
    <h1>Manager Login</h1>
    <p class="sub">QR Manu Dashboard</p>
    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="post" action="">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
