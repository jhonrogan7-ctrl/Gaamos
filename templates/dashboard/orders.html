{% extends 'dashboard/base.html' %}

{% block page_title %}Orders{% endblock %}
{% block subtitle %}All branches · live order queue{% endblock %}

{% block content %}
<div class="sec-h">
  <h3>Live order queue <span class="mini">All branches · updates in real time</span></h3>
</div>

<div class="panel"
     x-data="{ init() { const es = new EventSource('{% url 'dashboard:orders_stream' %}'); es.onmessage = () => { fetch('{% url 'dashboard:orders_queue' %}').then(r => r.text()).then(h => { this.$refs.queue.innerHTML = h; }); }; } }">
  <div x-ref="queue">
    {% include 'dashboard/_orders_queue.html' %}
  </div>
</div>
{% endblock %}
