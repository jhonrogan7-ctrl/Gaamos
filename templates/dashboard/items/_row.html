{% load static %}
<div class="row" data-name="{{ item.name|lower }}"
     x-show="nq === '' || $el.dataset.name.includes(nq)"
     onclick="window.location.href='{% url 'dashboard:item_edit' item.pk %}'">
  <span class="grip">⋮⋮</span>
  {% if item.image_url %}
    <div class="th" style="background-image:url('{{ item.image_url }}')"></div>
  {% else %}
    <div class="th" style="background:var(--accent-soft)"></div>
  {% endif %}
  <div style="min-width:0;">
    <div class="rn">{{ item.name }}</div>
    <div class="rm">{% if item.dietary_tags %}{{ item.dietary_tags|join:" · " }}{% else %}Library item{% endif %}</div>
  </div>
  <span class="pr">Rs {{ item.price }}</span>
  <div class="rowtoggle"></div>
</div>
