<form method="post" action="{% url 'ops:lead_status' lead.id %}" style="display:inline">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.get_full_path }}">
  <select name="status" class="ops-status" onchange="this.form.submit()" aria-label="Lead status">
    {% for value, label in statuses %}
    <option value="{{ value }}" {% if lead.status == value %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
</form>
