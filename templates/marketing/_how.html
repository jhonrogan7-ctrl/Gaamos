<section id="how" class="mk-wrap py-20">
  <div class="text-center mb-12">
    <div class="mk-eyebrow">How it works</div>
    <h2 class="font-hd text-3xl md:text-4xl font-extrabold text-ink mt-2">Live by lunchtime</h2>
  </div>
  <div class="grid md:grid-cols-3 gap-6">
    {% for s in steps %}
    <div class="mk-card p-6 mk-reveal transition hover:-translate-y-1">
      <div class="w-10 h-10 rounded-full mk-grad text-white font-bold flex items-center justify-center">{{ s.n }}</div>
      <h3 class="font-hd text-xl font-bold text-ink mt-4">{{ s.title }}</h3>
      <p class="text-ink-2 mt-2 text-sm">{{ s.body }}</p>
    </div>
    {% endfor %}
  </div>
</section>
