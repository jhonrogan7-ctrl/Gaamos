{% load i18n %}
<section class="mk-wrap py-20">
  <div class="mk-card mk-grad text-white text-center rounded-2xl p-12 shadow-frame">

    <p class="text-white/85 mt-3 max-w-xl mx-auto">{% translate "It's their phone. Put your menu on it tonight — live in minutes." %}</p>
    <a href="#contact" class="inline-block mt-6 bg-white text-ink rounded-full px-8 py-3 font-semibold text-sm hover:-translate-y-0.5 transition">{% translate "Get started" %}</a>
    <p class="text-xs text-white/70 mt-3">{% translate "Plans from Rs 3,000 a month — cancel anytime" %}</p>
  </div>
</section>
