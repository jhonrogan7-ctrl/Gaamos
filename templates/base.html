{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="{{ company.theme|default:'saffron' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gaamos{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <link rel="manifest" href="{% static 'pwa/manifest.webmanifest' %}">
  <meta name="theme-color" content="#e23744">
  <script defer src="{% static 'vendor/alpine.min.js' %}"></script>
  <script src="{% static 'vendor/htmx.min.js' %}"></script>
</head>
<body class="bg-[#eef0f4] text-[#171a21]">
  {% block content %}{% endblock %}
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js", { scope: "/" });
    }
  </script>
</body>
</html>
