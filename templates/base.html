{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gaamos{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
  <link rel="manifest" href="{% static 'pwa/manifest.webmanifest' %}">
  <meta name="theme-color" content="#e23744">
  <script defer src="{% static 'vendor/alpine.min.js' %}"></script>
  <script src="{% static 'vendor/htmx.min.js' %}"></script>
</head>
<body class="bg-[#eef0f4] text-[#171a21]">
  {% block content %}{% endblock %}
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("{% static 'pwa/sw.js' %}");
    }
  </script>
</body>
</html>
