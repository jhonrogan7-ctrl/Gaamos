{# Shared guest brand bar — tenant logo/monogram + branch venue name + order/about buttons (F2). #}
<div class="brandbar">
  <div class="brand">
    <template x-if="restaurant.logo_url">
      <div class="g-mono g-mono--img"><img class="g-logo" :src="restaurant.logo_url" :alt="venueName() + ' logo'"></div>
    </template>
    <template x-if="!restaurant.logo_url">
      <div class="g-mono" x-text="monogram()"></div>
    </template>
    <div class="name">
      <span x-text="venueName()"></span>
      <small x-text="branch.address"></small>
    </div>
  </div>
  <div style="display:flex;gap:6px;">
    <button class="icon-btn" @click="screen='cart'" aria-label="View order">
      <span x-html="icon('heart')"></span>
      <span class="badge" x-show="cartCount > 0" x-text="cartCount"></span>
    </button>
    <button class="icon-btn" @click="contactOpen=true" aria-label="About & contact">
      <span x-html="icon('info')"></span>
    </button>
  </div>
</div>
